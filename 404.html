<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Atelier MAUDÉ</title>
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Page introuvable — Atelier MAUDÉ">
<meta property="og:locale" content="fr_FR">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#3A2A1E">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F0EA;
  --bg:#FAF7F2;
  --brown:#6B4F3A;
  --dark-brown:#3A2A1E;
  --terracotta:#8B4A3A;
  --gold:#C9A96E;
  --text:#2C2218;
  --muted:#74665B;
  --border:rgba(107,79,58,0.12);
}
html,body{height:100%}
body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-weight:300;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}

/* ── HEADER ── */
.site-header{
  padding:22px 48px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
  font-weight:400;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--dark-brown);
  transition:opacity 0.2s ease-out;
}
.logo:hover{opacity:0.6}

/* ── MAIN ── */
main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:80px 40px;
  position:relative;
  overflow:hidden;
}

/* Ghost number */
.ghost-num{
  position:absolute;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(200px,38vw,420px);
  font-weight:300;
  color:var(--dark-brown);
  opacity:0.04;
  line-height:1;
  letter-spacing:-0.04em;
  user-select:none;
  pointer-events:none;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  white-space:nowrap;
}

/* Editorial content */
.wrap{
  position:relative;
  z-index:1;
  text-align:center;
  max-width:520px;
  width:100%;
}
.eyebrow{
  font-size:10px;
  letter-spacing:0.32em;
  text-transform:uppercase;
  color:var(--terracotta);
  margin-bottom:32px;
  display:block;
}
.rule{
  display:flex;
  align-items:center;
  gap:14px;
  max-width:120px;
  margin:0 auto 40px;
}
.rule::before,.rule::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--terracotta);
  opacity:0.3;
}
.rule-dot{
  width:4px;
  height:4px;
  border-radius:50%;
  background:var(--terracotta);
  opacity:0.45;
  flex-shrink:0;
}
.title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,4.5vw,50px);
  font-weight:300;
  line-height:1.25;
  color:var(--dark-brown);
  margin-bottom:52px;
  letter-spacing:0.01em;
}
.title em{
  font-style:italic;
  color:var(--brown);
}
.cta{
  display:inline-block;
  font-size:10px;
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:var(--dark-brown);
  border-bottom:1px solid var(--border);
  padding-bottom:3px;
  transition:color 0.2s ease-out, border-color 0.2s ease-out;
}
.cta:hover{
  color:var(--terracotta);
  border-color:var(--terracotta);
}

/* ── FOOTER ── */
.site-footer{
  padding:22px 48px;
  border-top:1px solid var(--border);
  text-align:center;
}
.site-footer p{
  font-size:11px;
  letter-spacing:0.08em;
  color:var(--muted);
}
.site-footer a{
  color:var(--muted);
  transition:color 0.2s ease-out;
}
.site-footer a:hover{color:var(--dark-brown)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .site-header{padding:18px 24px}
  main{padding:60px 24px}
  .site-footer{padding:18px 24px}
}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition-duration:0.01ms!important}
}
</style>
<link rel="stylesheet" href="animations.css">
<script src="cursor.js" defer></script>
<script src="page-transitions.js" defer></script>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">Atelier MAUDÉ</a>
</header>

<main>
  <span class="ghost-num" aria-hidden="true">404</span>
  <div class="wrap">
    <span class="eyebrow">Page introuvable</span>
    <div class="rule" aria-hidden="true"><div class="rule-dot"></div></div>
    <h1 class="title">
      Cette page n'existe plus.<br>
      <em>Comme une pièce vendue,<br>elle ne reviendra pas.</em>
    </h1>
    <a href="index.html" class="cta">Retour à l'accueil</a>
  </div>
</main>

<footer class="site-footer">
  <p>© 2026 Atelier MAUDÉ &nbsp;·&nbsp; <a href="contact.html">Contact</a> &nbsp;·&nbsp; <a href="cgv.html">CGV</a></p>
</footer>

<script src="mobile.js" defer></script>
</body>
</html>
